<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Markdown a HTML</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        /* === INICIO VARIABLES CSS GLOBALES === */
        :root {
            --color-h1: #0d6efd; --color-h2: #0dcaf0; --color-h3: #6c757d; --color-h4: #198754; --color-h5: #fd7e14; --color-h6: #6f42c1;
            --color-code: #d63384; --bg-pre: #f8f9fa; --bg-code-inline: #f8f9fa;
            --bg-indice: #f8f9fa; --color-indice-link: #0d6efd; --color-indice-link-hover: #0a58ca; --bg-indice-link-hover: #e9ecef;
            --color-indice-link-active: #212529; --bg-indice-link-active: #dee2e6;
            --border-ejercicios: #0dcaf0; --bg-ejercicios: #f8f9fa;
            --body-bg-color: #ffffff; --text-color: #212529; --link-color: #0d6efd;
            --copy-btn-bg: #6c757d; --copy-btn-color: white; --copy-btn-hover-bg: #5a6268; --copy-btn-success-bg: #198754;
            --app-header-bg: #1e293b; --app-surface: #ffffff; --app-border: #e2e8f0; --app-bg: #f1f5f9;
        }
        /* === FIN VARIABLES CSS GLOBALES === */

        /* === ESTILOS DE LA APLICACIÓN GENERADORA (Interfaz - NO SE EXPORTAN) === */
        *, *::before, *::after { box-sizing: border-box; }
        body.app-interface { margin: 0; padding: 0; background-color: var(--app-bg); color: var(--text-color); font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

        .app-header { background: var(--app-header-bg); color: #f8fafc; padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; box-shadow: 0 1px 3px rgba(0,0,0,.12), 0 1px 2px rgba(0,0,0,.08); position: sticky; top: 0; z-index: 1030; }
        .app-header .app-brand { display: flex; align-items: center; gap: 0.6rem; font-size: 1.1rem; font-weight: 600; letter-spacing: -0.01em; white-space: nowrap; }
        .app-header .app-brand .bi { font-size: 1.3rem; opacity: 0.9; }
        .app-header-actions { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; }
        .app-header-actions .btn { font-size: 0.8rem; padding: 0.35rem 0.75rem; border-radius: 0.375rem; font-weight: 500; display: inline-flex; align-items: center; gap: 0.35rem; }
        .app-header-actions .btn-generate { background: #3b82f6; border: none; color: white; }
        .app-header-actions .btn-generate:hover { background: #2563eb; }
        .app-header-actions .btn-download { background: #10b981; border: none; color: white; }
        .app-header-actions .btn-download:hover { background: #059669; }
        .app-header-actions .btn-tool { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15); color: #e2e8f0; }
        .app-header-actions .btn-tool:hover { background: rgba(255,255,255,.18); color: white; }
        .app-header-actions .divider { width: 1px; height: 24px; background: rgba(255,255,255,.15); margin: 0 0.25rem; }
        .app-header-actions .theme-select { font-size: 0.8rem; padding: 0.35rem 2rem 0.35rem 0.5rem; border-radius: 0.375rem; background-color: rgba(255,255,255,.1); color: #e2e8f0; border: 1px solid rgba(255,255,255,.15); max-width: 180px; cursor: pointer; }
        .app-header-actions .theme-select:focus { outline: none; box-shadow: 0 0 0 2px rgba(59,130,246,.5); }
        .app-header-actions .theme-select option { background: #1e293b; color: #e2e8f0; }

        .app-main { flex: 1; display: flex; flex-direction: column; }

        .editor-panel { background: var(--app-surface); border-bottom: 1px solid var(--app-border); }
        .editor-panel .editor-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; padding: 0.6rem 1rem 0; margin: 0; }
        #markdownInput { width: 100%; min-height: 220px; font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", "SF Mono", Menlo, Monaco, Consolas, monospace; font-size: 0.85rem; line-height: 1.6; border: none; border-top: 1px solid var(--app-border); background-color: var(--app-surface); color: var(--text-color); padding: 1rem; resize: vertical; outline: none; transition: box-shadow 0.15s ease; }
        #markdownInput:focus { box-shadow: inset 0 2px 4px rgba(59,130,246,.08); background-color: #fefefe; }

        #previewSection { flex: 1; padding: 1.5rem; }
        #previewSection .preview-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 2px solid var(--app-border); }
        #previewSection .preview-header h2 { margin: 0; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; }
        #previewSection .preview-header .bi { color: #94a3b8; }

        .offcanvas { background-color: var(--app-surface); color: var(--text-color); }
        .offcanvas-header { border-bottom: 1px solid var(--app-border); padding: 1rem 1.25rem; }
        .offcanvas-header .offcanvas-title { font-weight: 600; font-size: 1rem; }
        .offcanvas-body { padding: 1.25rem; }
        .offcanvas-body label { display: block; margin-bottom: 0.3rem; font-weight: 500; font-size: 0.8rem; color: #64748b; }
        .offcanvas-body input[type="color"] { width: 100%; height: 36px; border: 1px solid var(--app-border); padding: 0.2rem; cursor: pointer; border-radius: 0.375rem; background-color: white; transition: box-shadow 0.15s ease; }
        .offcanvas-body input[type="color"]:hover { box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
        .offcanvas-body .form-group { margin-bottom: 0.75rem; }
        .offcanvas-body h6 { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #94a3b8; margin-top: 0.5rem; margin-bottom: 0.75rem; }
        .offcanvas-body hr { border-color: var(--app-border); margin: 1rem 0; }
        /* --- FIN ESTILOS APP --- */

        /* === INICIO ESTILOS UNIFICADOS para PREVISUALIZACIÓN y DESCARGA === */
        #previewSection #htmlOutputBody, .generated-html-body { position: relative; background-color: var(--body-bg-color); color: var(--text-color); }
        #previewSection #htmlOutputBody a, .generated-html-body a { color: var(--link-color); text-decoration: none; }
        #previewSection #htmlOutputBody a:hover, .generated-html-body a:hover { color: color-mix(in srgb, var(--link-color) 80%, black); text-decoration: underline; }
        #indiceContenidoPreview, #indiceContenido { position: sticky; top: 1rem; height: calc(100vh - 2rem); overflow-y: auto; border: 1px solid #dee2e6; border-radius: 0.375rem; padding: 1rem; background-color: var(--bg-indice); }
        #indiceContenidoPreview h5, #indiceContenido h5 { color: var(--color-h5); }
        #indiceContenidoPreview .nav-link, #indiceContenido .nav-link { color: var(--color-indice-link); padding-top: 0.3rem; padding-bottom: 0.3rem; border-radius: 0.25rem; font-size: 0.9rem; transition: background-color 0.15s ease-in-out, color 0.15s ease-in-out; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: normal; }
        #indiceContenidoPreview .nav-link:hover, #indiceContenido .nav-link:hover { color: var(--color-indice-link-hover); background-color: var(--bg-indice-link-hover); }
        #indiceContenidoPreview .nav-link.active, #indiceContenidoPreview .nav-link:focus, #indiceContenido .nav-link.active, #indiceContenido .nav-link:focus { color: var(--color-indice-link-active); background-color: var(--bg-indice-link-active); font-weight: normal; }
        #indiceNavPreview .nav-link, #indiceNav .nav-link { padding-left: 0.5rem; }
        #indiceNavPreview .ps-3, #indiceNav .ps-3 { padding-left: 1.5rem !important; } #indiceNavPreview .ps-4, #indiceNav .ps-4 { padding-left: 2.5rem !important; } #indiceNavPreview .ps-5, #indiceNav .ps-5 { padding-left: 3.5rem !important; } #indiceNavPreview .ps-6, #indiceNav .ps-6 { padding-left: 4.5rem !important; }
        #mainContentPreview, #mainContent {}
        #mainContentPreview [id], #mainContent [id] { scroll-margin-top: 70px; }
        @media (max-width: 767.98px) { #mainContentPreview [id], #mainContent [id] { scroll-margin-top: 60px; } }
        #mainContentPreview h1, #mainContent h1 { color: var(--color-h1); font-size: 2.2rem; border-bottom: 1px solid #eee; padding-bottom: 0.5rem;}
        #mainContentPreview h2, #mainContent h2 { color: var(--color-h2); font-size: 1.8rem; border-bottom: 1px solid #eee; padding-bottom: 0.4rem;}
        #mainContentPreview h3, #mainContent h3 { color: var(--color-h3); font-size: 1.5rem; } #mainContentPreview h4, #mainContent h4 { color: var(--color-h4); font-size: 1.25rem; } #mainContentPreview h5, #mainContent h5 { color: var(--color-h5); font-size: 1.1rem; font-weight: bold; } #mainContentPreview h6, #mainContent h6 { color: var(--color-h6); font-size: 1rem; font-weight: bold; }
        #mainContentPreview p, #mainContentPreview li, #mainContent p, #mainContent li { line-height: 1.6; margin-bottom: 1rem; }
        #mainContentPreview ul, #mainContentPreview ol, #mainContent ul, #mainContent ol { padding-left: 2rem; } #mainContentPreview ul ul, #mainContent ul ul { margin-bottom: 0; }
        #mainContentPreview pre, #mainContent pre { position: relative; background-color: var(--bg-pre); border: 1px solid #dee2e6; border-radius: 0.25rem; padding: 1rem; padding-top: 2.5rem; overflow-x: auto; white-space: pre-wrap; word-break: break-all; margin-top: 1rem; margin-bottom: 1rem; font-size: 0.9em; }
        #mainContentPreview code, #mainContent code { color: var(--color-code); word-wrap: break-word; font-family: SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
        #mainContentPreview pre code, #mainContent pre code { background-color: transparent; border: none; padding: 0; font-size: 1em; white-space: pre-wrap; word-break: break-all; }
        #mainContentPreview :not(pre) > code, #mainContent :not(pre) > code { background-color: var(--bg-code-inline); padding: 0.2em 0.4em; margin: 0; font-size: 85%; border-radius: 3px; }
        .copy-code-btn { position: absolute; top: 0.5rem; right: 0.5rem; z-index: 10; padding: 0.25rem 0.5rem; font-size: 0.75rem; color: var(--copy-btn-color); background-color: var(--copy-btn-bg); border: none; border-radius: 0.25rem; cursor: pointer; opacity: 0.7; transition: opacity 0.2s ease-in-out, background-color 0.2s ease-in-out; }
        #mainContentPreview pre:hover .copy-code-btn, #mainContent pre:hover .copy-code-btn { opacity: 1; }
        .copy-code-btn:hover { background-color: var(--copy-btn-hover-bg); }
        .copy-code-btn.copied { background-color: var(--copy-btn-success-bg); }
        .copy-code-btn svg { width: 1em; height: 1em; vertical-align: -0.125em; margin-right: 0.3em;}
        #mainContentPreview h5 + ol, #mainContentPreview h5 + ul, #mainContent h5 + ol, #mainContent h5 + ul { border-left: 4px solid var(--border-ejercicios); padding: 1rem 1rem 1rem 1.5rem; margin-top: 1.5rem; margin-bottom: 1.5rem; background-color: var(--bg-ejercicios); border-radius: 0.25rem; list-style-position: inside; } #mainContentPreview h5 + ol > li, #mainContentPreview h5 + ul > li, #mainContent h5 + ol > li, #mainContent h5 + ul > li { margin-bottom: 0.5rem; } #mainContentPreview h5 + ol > li strong, #mainContentPreview h5 + ul > li strong, #mainContent h5 + ol > li strong, #mainContent h5 + ul > li strong { color: var(--border-ejercicios); }
        #mainContentPreview blockquote, #mainContent blockquote { padding: 0.5rem 1rem; margin: 0 0 1rem; font-size: 1rem; border-left: 0.25rem solid #e9ecef; color: #6c757d; } #mainContentPreview blockquote p, #mainContent blockquote p { margin-bottom: 0; }
        #mainContentPreview img, #mainContent img { max-width: 100%; height: auto; margin-top: 1rem; margin-bottom: 1rem; border-radius: 0.25rem; display: block; }
        #mainContentPreview table, #mainContent table { width: 100%; margin-bottom: 1rem; color: var(--text-color); border-collapse: collapse; border: 1px solid #dee2e6; font-size: 0.9rem; }
        #mainContentPreview table th, #mainContent table td, #mainContent table th, #mainContent table td { padding: 0.75rem; vertical-align: top; border: 1px solid #dee2e6; }
        /* Estilo Default (Light) para thead th */
        #mainContentPreview table thead th,
        #mainContent table thead th {
            vertical-align: bottom;
            border-bottom: 2px solid #dee2e6;
            background-color: #f8f9fa;
            color: inherit;
            font-weight: bold;
        }
        /* Estilo Específico para Dark Theme */
        [data-bs-theme="dark"] #mainContentPreview table thead th,
        [data-bs-theme="dark"] #mainContent table thead th {
            background-color: var(--bg-pre, #212529);
            color: var(--text-color, #f8f9fa);
            border-color: color-mix(in srgb, var(--text-color, #dee2e6) 30%, transparent);
        }
        #mainContentPreview table tbody tr:nth-of-type(odd), #mainContent table tbody tr:nth-of-type(odd) { background-color: rgba(0, 0, 0, 0.03); }
        .accordion { margin-bottom: 1rem; }
        .accordion-item { margin-bottom: 0.5rem; border: 1px solid rgba(0,0,0,.125); border-radius: 0.25rem; background-color: var(--body-bg-color); }
        .accordion-header button { font-weight: 500; color: var(--color-h3); background-color: var(--bg-indice-link-hover); }
        .accordion-button:not(.collapsed) { color: var(--color-h3); background-color: var(--bg-indice-link-active); }
        .accordion-button:focus { box-shadow: 0 0 0 0.25rem rgba(var(--bs-link-color-rgb),.25); }
        .accordion-body { padding: 1rem 1.25rem; color: var(--text-color); background-color: var(--body-bg-color);}
        .accordion-body > :last-child { margin-bottom: 0; }
        @media (max-width: 767.98px) {
            #indiceContenidoPreview, #indiceContenido { display: none; }
            #mainContentPreview, #mainContent { min-height: auto; }
            .app-header { padding: 0.6rem 1rem; }
            .app-header .app-brand { font-size: 0.95rem; }
            .app-header-actions .btn { font-size: 0.75rem; padding: 0.3rem 0.55rem; }
            .app-header-actions .divider { display: none; }
            .app-header-actions .theme-select { max-width: 140px; font-size: 0.75rem; }
        }
        /* === FIN ESTILOS UNIFICADOS === */
    </style>
</head>
<body class="app-interface">

    <!-- Header -->
    <header class="app-header">
        <div class="app-brand">
            <i class="bi bi-markdown-fill"></i>
            <span>MD → HTML</span>
        </div>
        <div class="app-header-actions">
            <button id="generateBtn" class="btn btn-generate">
                <i class="bi bi-arrow-repeat"></i> Generar
            </button>
            <button id="downloadBtn" class="btn btn-download">
                <i class="bi bi-download"></i> Descargar
            </button>
            <span class="divider"></span>
            <button id="insertAccordionBtn" class="btn btn-tool" type="button" title="Insertar bloque de acordeón">
                <i class="bi bi-chevron-bar-expand"></i> Acordeón
            </button>
            <button id="insertImageBtn" class="btn btn-tool" type="button" title="Insertar imagen desde archivo">
                <i class="bi bi-image"></i> Imagen
            </button>
            <span class="divider"></span>
            <button class="btn btn-tool" type="button" data-bs-toggle="offcanvas" data-bs-target="#personalizationOffcanvas" aria-controls="personalizationOffcanvas" title="Personalizar colores">
                <i class="bi bi-palette-fill"></i> Colores
            </button>
            <select id="themeSelector" class="theme-select" aria-label="Seleccionar Tema"></select>
        </div>
    </header>

    <!-- Main content -->
    <div class="app-main">
        <!-- Editor -->
        <div class="editor-panel">
            <label for="markdownInput" class="editor-label">Editor Markdown</label>
            <textarea class="form-control" id="markdownInput" rows="12" placeholder="# Escribe tu Markdown aquí...&#10;&#10;Usa **negrita**, *cursiva*, `código` y más.&#10;&#10;## Secciones&#10;Organiza tu contenido con encabezados."></textarea>
        </div>

        <!-- Preview -->
        <section id="previewSection">
            <div class="preview-header">
                <i class="bi bi-eye"></i>
                <h2>Vista Previa</h2>
            </div>
            <div id="htmlOutputBody" data-bs-spy="scroll" data-bs-target="#indiceContenidoPreview" data-bs-offset="100">
                <div class="row">
                    <div class="col-md-4 col-lg-3 d-none d-md-block">
                        <nav id="indiceContenidoPreview">
                            <h5 class="mb-3">Índice</h5>
                            <nav class="nav nav-pills flex-column" id="indiceNavPreview"></nav>
                        </nav>
                    </div>
                    <div class="col-md-8 col-lg-9">
                        <main id="mainContentPreview"></main>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Offcanvas personalización -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="personalizationOffcanvas" aria-labelledby="personalizationOffcanvasLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="personalizationOffcanvasLabel"><i class="bi bi-palette-fill me-2"></i>Personalizar Estilos</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <h6>Contenido General</h6>
            <div class="row">
                <div class="col-6">
                    <div class="form-group"><label for="colorH1">Color H1</label><input type="color" id="colorH1" class="form-control form-control-color" data-css-var="--color-h1"></div>
                    <div class="form-group"><label for="colorH2">Color H2</label><input type="color" id="colorH2" class="form-control form-control-color" data-css-var="--color-h2"></div>
                    <div class="form-group"><label for="colorH3">Color H3</label><input type="color" id="colorH3" class="form-control form-control-color" data-css-var="--color-h3"></div>
                    <div class="form-group"><label for="colorH4">Color H4</label><input type="color" id="colorH4" class="form-control form-control-color" data-css-var="--color-h4"></div>
                    <div class="form-group"><label for="colorH5">Color H5</label><input type="color" id="colorH5" class="form-control form-control-color" data-css-var="--color-h5"></div>
                    <div class="form-group"><label for="colorH6">Color H6</label><input type="color" id="colorH6" class="form-control form-control-color" data-css-var="--color-h6"></div>
                </div>
                <div class="col-6">
                    <div class="form-group"><label for="linkColor">Enlaces</label><input type="color" id="linkColor" class="form-control form-control-color" data-css-var="--link-color"></div>
                    <div class="form-group"><label for="textColor">Texto</label><input type="color" id="textColor" class="form-control form-control-color" data-css-var="--text-color"></div>
                    <div class="form-group"><label for="colorCode">Código</label><input type="color" id="colorCode" class="form-control form-control-color" data-css-var="--color-code"></div>
                    <div class="form-group"><label for="bgPre">Fondo Bloque Código</label><input type="color" id="bgPre" class="form-control form-control-color" data-css-var="--bg-pre"></div>
                    <div class="form-group"><label for="bgCodeInline">Fondo Código Inline</label><input type="color" id="bgCodeInline" class="form-control form-control-color" data-css-var="--bg-code-inline"></div>
                    <div class="form-group"><label for="bodyBgColor">Fondo Página</label><input type="color" id="bodyBgColor" class="form-control form-control-color" data-css-var="--body-bg-color"></div>
                </div>
            </div>
            <hr>
            <h6>Índice</h6>
            <div class="row">
                <div class="col-6">
                    <div class="form-group"><label for="bgIndice">Fondo</label><input type="color" id="bgIndice" class="form-control form-control-color" data-css-var="--bg-indice"></div>
                    <div class="form-group"><label for="colorIndiceLink">Texto Link</label><input type="color" id="colorIndiceLink" class="form-control form-control-color" data-css-var="--color-indice-link"></div>
                    <div class="form-group"><label for="bgIndiceLinkHover">Fondo Hover</label><input type="color" id="bgIndiceLinkHover" class="form-control form-control-color" data-css-var="--bg-indice-link-hover"></div>
                </div>
                <div class="col-6">
                    <div class="form-group"><label for="colorIndiceLinkHover">Texto Hover</label><input type="color" id="colorIndiceLinkHover" class="form-control form-control-color" data-css-var="--color-indice-link-hover"></div>
                    <div class="form-group"><label for="colorIndiceLinkActive">Texto Activo</label><input type="color" id="colorIndiceLinkActive" class="form-control form-control-color" data-css-var="--color-indice-link-active"></div>
                    <div class="form-group"><label for="bgIndiceLinkActive">Fondo Activo</label><input type="color" id="bgIndiceLinkActive" class="form-control form-control-color" data-css-var="--bg-indice-link-active"></div>
                </div>
            </div>
            <div class="alert alert-info mt-3 small" role="alert"><i class="bi bi-info-circle me-1"></i>Los cambios de color se aplican en tiempo real.</div>
        </div>
    </div>

    <input type="file" id="imageFileInput" accept="image/*" hidden>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.11/dist/purify.min.js"></script>
    <script src="styles-data.js"></script>
    <script src="app.js"></script>
</body>
</html>
